{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>New Message</title>
    <link rel="stylesheet" href="{% static 'messages_app/style.css' %}">
</head>
<body>

<div class="container">

<a href="/messages/inbox/">Inbox</a>
<a href="/messages/new/">New Message</a>
<a href="/messages/drafts/">Drafts</a>

<h1>New Message</h1>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}

</form>

</div>

</body>
</html>
