{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Message</title>
    <link rel="stylesheet" href="{% static 'teams/style.css' %}?v=202">
    <link rel="stylesheet" href="{% static 'teams/dashboard.css' %}">
</head>

<body>

<div class="topbar">
    <div class="logo">
        <img src="{% static 'teams/sky-logo.png' %}" alt="Sky Logo" style="height:75px;">
        <p>Engineering Team Directory</p>
    </div>
</div>

<div class="layout">

<div class="sidebar">
    <ul class="nav">
        <li onclick="window.location.href='/teams/dashboard/'">
            <span class="icon">D</span>Dashboard
        </li>

        <li onclick="window.location.href='/teams/'">
            <span class="icon">T</span>Teams
        </li>

        <li class="active" onclick="window.location.href='/messages/inbox/'">
            <span class="icon">M</span>Messages
        </li>

        <li onclick="window.location.href='/reports/'">
            <span class="icon">R</span>Reports
        </li>

        <li onclick="window.location.href='/visualisation/'">
            <span class="icon">V</span>Visualisation
        </li>
    </ul>
</div>

<div class="content">

<h1 class="main-title">New Message</h1>

<div class="buttons">
    <a class="btn-outline" href="/messages/inbox/">Inbox</a>
    <a class="btn-outline" href="/messages/new/">New Message</a>
    <a class="btn-outline" href="/messages/drafts/">Drafts</a>
    <a class="btn-outline" href="/messages/sent/">Sent</a>
</div>

<br>

<div class="card">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button class="btn-primary" type="submit">Send Message</button>
        <button class="btn-outline" type="submit" name="save_draft">Save Draft</button>
    </form>
</div>

</div>
</div>

<footer>
© 2026 LOGOSKY • Privacy • Terms • Contact
</footer>

</body>
</html>
