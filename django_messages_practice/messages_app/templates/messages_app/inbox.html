<!DOCTYPE html>
<html>
<head>
    <title>Inbox</title>
</head>
<body>
    <h1>Inbox</h1>

    {% if messages %}
        <ul>
            {% for message in messages %}
                <li>
                    <strong>{{ message.subject }}</strong><br>
                    To: {{ message.recipient }}<br>
                    {{ message.body }}<br><br>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No messages found.</p>
    {% endif %}
</body>
</html>
