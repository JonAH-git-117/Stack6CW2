{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <!-- Reusing the shared teams stylesheet for consistent styling -->
    <link rel="stylesheet" href="{% static 'teams/style.css' %}?v=200">
</head>

<body>

<!-- Top navigation bar with LOGOSKY branding -->
<div class="topbar">
    <div class="logo">
        <strong>LOGOSKY</strong>
        <p>Engineering Team Directory</p>
    </div>
</div>

<div class="layout">

    <!-- Sidebar navigation -->
    <div class="sidebar">
        <ul class="nav">
            <li onclick="window.location.href='/accounts/login/'">
                <span class="icon">L</span>Login
            </li>
            <li onclick="window.location.href='/accounts/signup/'">
                <span class="icon">S</span>Sign Up
            </li>
        </ul>
    </div>

    <div class="content">

        <h1>Reset Password</h1>
        <p class="subtitle">Enter your email address to receive a password reset link</p>

        <div class="card">
            <h3>Forgot Password</h3>

            <!-- Step 1 of password reset flow - user enters email.
                 Handled by Django's built-in PasswordResetView CBV
                 as shown in the Week 9 lecture slides -->
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="buttons">
                    <button class="btn-primary" type="submit">Send Reset Email</button>
                    <a href="/accounts/login/" class="btn-outline">Back to Login</a>
                </div>
            </form>
        </div>

    </div>
</div>

<footer>
    © 2026 LOGOSKY • Privacy • Terms • Contact
</footer>

</body>
</html>
