{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Changed</title>
    <!-- Reusing the shared teams stylesheet for consistent styling -->
    <link rel="stylesheet" href="{% static 'teams/style.css' %}?v=200">
</head>

<body>

<!-- Top navigation bar with LOGOSKY branding -->
<div class="topbar">
    <div class="logo">
        <strong>LOGOSKY</strong>
        <p>Engineering Team Directory</p>
    </div>
</div>

<div class="layout">

    <!-- Sidebar navigation -->
    <div class="sidebar">
        <ul class="nav">
            <li onclick="window.location.href='/teams/'">
                <span class="icon">T</span>Teams
            </li>
            <!-- Logout link - redirects to accounts logout view -->
            <li onclick="window.location.href='/accounts/logout/'">
                <span class="icon">L</span>Logout
            </li>
        </ul>
    </div>

    <div class="content">

        <h1>Password Changed</h1>
        <p class="subtitle">Your password has been successfully updated</p>

        <!-- Success confirmation card - rendered by Django's built-in
             PasswordChangeDoneView CBV -->
        <div class="card">
            <h3>Success</h3>
            <p>Your password has been changed successfully.</p>
            <div class="buttons">
                <a href="/" class="btn-primary">Return to Home</a>
            </div>
        </div>

    </div>
</div>

<footer>
    © 2026 LOGOSKY • Privacy • Terms • Contact
</footer>

</body>
</html>
